<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本服飾店日語學習工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #9C4A3C;
    --navy-deep: #7A382D;
    --steel: #B87A6E;
    --bg: #F4F5F7;
    --card: #FFFFFF;
    --card-alt: #E9EBEF;
    --line: #DCDFE4;
    --ink: #24282E;
    --ink-soft: #6B7280;
    --muted: #9CA3AF;
    --accent: #9C4A3C;
    --accent-soft: #F2DED9;
    --on-accent: #F4F5F7;
    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-pill: 999px;
  }

  html[data-theme="dark"] {
    --bg: #1C1B1A;
    --card: #262423;
    --card-alt: #302E2C;
    --line: #3F3D3A;
    --ink: #D9D5D0;
    --ink-soft: #A8A39C;
    --muted: #7A766F;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans TC", "Noto Serif JP", serif;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ---------- Header ---------- */
  .topbar {
    background: var(--navy);
    color: var(--on-accent);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: baseline; gap: 10px; }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .topbar-sub {
    font-size: 12px;
    color: rgba(244,245,247,0.65);
    letter-spacing: 0.02em;
  }

  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: var(--r-pill);
    border: 1px solid rgba(244,245,247,0.25);
    background: rgba(244,245,247,0.08);
    color: #F4F5F7;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .theme-toggle:hover {
    background: rgba(244,245,247,0.16);
    border-color: rgba(244,245,247,0.4);
  }
  .theme-toggle svg { width: 17px; height: 17px; }

  /* ---------- Tab nav ---------- */
  .tabbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }

  .tab-item {
    flex: 1;
    text-align: center;
    padding: 16px 10px;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    user-select: none;
  }
  .tab-item:hover { color: var(--ink); }
  .tab-item.active {
    color: var(--ink);
    font-weight: 700;
    border-bottom-color: var(--navy);
  }

  .subtabbar {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }
  .subtab-item {
    padding: 11px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .subtab-item:hover { color: var(--ink); }
  .subtab-item.active {
    color: var(--navy);
    font-weight: 700;
    border-bottom-color: var(--navy);
  }

  /* ---------- Inner tab ---------- */
  .inner-tabbar {
    display: inline-flex;
    gap: 4px;
    background: var(--card-alt);
    border-radius: var(--r-pill);
    padding: 4px;
    margin-bottom: 22px;
  }
  .inner-tab-item {
    padding: 8px 20px;
    border-radius: var(--r-pill);
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .inner-tab-item:hover { color: var(--ink); }
  .inner-tab-item.active {
    background: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }

  .inner-view { display: none; }
  .inner-view.active { display: block; }

  /* ---------- Main ---------- */
  .main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 24px 80px;
  }

  .section-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ---------- View switching ---------- */
  .view { display: none; }
  .view.active { display: block; }

  /* ====== STUDY (flashcard) view ====== */
  .study-layout {
    max-width: 560px;
    margin: 0 auto;
  }

  .card-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 48px 40px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
  }

  .card-index-tag {
    position: absolute;
    top: 20px;
    left: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-jp {
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-kana {
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .card-zh {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    min-height: 30px;
  }

  .card-hint {
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
  }

  .nav-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    width: 38px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { border-color: var(--navy); color: var(--navy); }

  .nav-counter {
    font-size: 13px;
    color: var(--muted);
    min-width: 56px;
    text-align: center;
  }

  .shuffle-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    padding: 0 18px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .shuffle-btn:hover { border-color: var(--navy); color: var(--navy); }

  /* ====== Reference table view ====== */
  .ref-toolbar-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .ref-toolbar-row .section-label {
    margin-bottom: 0;
  }

  .shape-filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .shape-filter-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .shape-filter-item:hover { border-color: var(--navy); color: var(--ink); }
  .shape-filter-item.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ref-cell {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px 20px;
    min-height: 56px;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .ref-cell:hover { border-color: var(--navy); }
  .ref-cell-jp { font-weight: 700; }
  .ref-cell.revealed {
    background: var(--card-alt);
    border-color: var(--navy);
  }
  .ref-cell-kana { font-size: 13px; color: var(--ink-soft); }
  .ref-cell-zh { font-size: 16px; font-weight: 700; color: var(--ink); }

  /* 中文常駐模式：取消點擊互動感，卡片永遠顯示假名＋中文 */
  .ref-grid.zh-pinned .ref-cell {
    cursor: default;
  }
  .ref-grid.zh-pinned .ref-cell:hover {
    border-color: var(--line);
  }

  /* ====== 收藏星號 / 單字發音 通用元件 ====== */
  .icon-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    width: 26px;
    height: 26px;
    border-radius: var(--r-pill);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover { border-color: var(--navy); color: var(--navy); }
  .icon-btn svg { width: 13px; height: 13px; }
  .icon-btn.playing { background: var(--navy); border-color: var(--navy); color: var(--on-accent); }
  .icon-btn.starred {
    color: #C8A32C;
    border-color: #C8A32C;
  }
  .icon-btn.starred svg { fill: #C8A32C; }

  /* 速查表格子上的小工具列 */
  .ref-cell { position: relative; }
  .ref-cell-tools {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .ref-cell:hover .ref-cell-tools,
  .ref-cell-tools:focus-within,
  .ref-cell-tools.always-show { opacity: 1; }
  .ref-cell-tools .icon-btn { width: 22px; height: 22px; }
  .ref-cell-tools .icon-btn svg { width: 11px; height: 11px; }

  @media (hover: none) {
    .ref-cell-tools { opacity: 1; }
  }

  /* 單字卡工具列 */
  .card-tools {
    position: absolute;
    top: 16px;
    right: 18px;
    display: flex;
    gap: 8px;
  }
  .card-tools .icon-btn { width: 30px; height: 30px; }
  .card-tools .icon-btn svg { width: 15px; height: 15px; }

  /* 常用句氣泡的星號 */
  .phrase-jp-row .icon-btn { margin-top: 1px; }

  /* 空狀態提示 */
  .empty-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: var(--r-md);
    padding: 40px 28px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ====== Quiz view ====== */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }

  .study-toolbar-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .study-toolbar-row .inner-tabbar {
    margin-bottom: 0;
  }
  .direction-toggle-btn {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--navy);
    background: var(--card);
    color: var(--navy);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .direction-toggle-btn:hover { background: var(--accent-soft); }

  .quiz-progress {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .quiz-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 22px;
  }
  .quiz-question-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .quiz-jp { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .quiz-kana { font-size: 14px; color: var(--ink-soft); }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .quiz-option {
    padding: 16px 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 14px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--navy); }
  .quiz-option.correct { background: #DCEADD; border-color: #4E7D54; color: #294A2D; }
  .quiz-option.wrong { background: #F1DCDC; border-color: #97393B; color: #6B2829; }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--navy);
    min-height: 18px;
  }
  .quiz-feedback-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
  }
  .quiz-score { font-size: 13px; color: var(--ink-soft); }
  .quiz-score strong { color: var(--navy); }

  .next-btn {
    padding: 9px 22px;
    border-radius: var(--r-pill);
    background: var(--navy);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .next-btn:disabled { opacity: 0.35; cursor: default; }

  .quiz-result { text-align: center; padding: 50px 30px; }
  .quiz-result .big-score { font-size: 46px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .quiz-result .result-msg { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }
  .restart-btn {
    padding: 10px 28px;
    border-radius: var(--r-pill);
    background: var(--navy);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ====== Confusables view ====== */
  .confuse-row {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 22px;
    margin-bottom: 12px;
  }
  .confuse-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .confuse-items { display: flex; gap: 12px; flex-wrap: wrap; }
  .confuse-pill {
    background: var(--card-alt);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 10px 18px;
    font-size: 14px;
  }
  .confuse-pill .k { font-weight: 700; color: var(--ink); }
  .confuse-pill .z { font-size: 12px; color: var(--muted); margin-left: 6px; }

  /* ====== Phrase view ====== */
  .phrase-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .phrase-toggle-group {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .phrase-toggle-btn {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .phrase-toggle-btn:hover { border-color: var(--navy); color: var(--ink); }
  .phrase-toggle-btn[data-on="true"] {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scene-tabbar {
    display: flex;
    gap: 8px;
    margin: 0 auto 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }
  .scene-tab-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .scene-tab-item:hover { border-color: var(--navy); color: var(--ink); }
  .scene-tab-item.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scenario-tabbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 0 auto 16px;
    max-width: 680px;
  }
  .scenario-tab-item {
    padding: 9px 14px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scenario-tab-item:hover { border-color: var(--navy); color: var(--ink); }
  .scenario-tab-item.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }

  .playall-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    max-width: 680px;
    margin: 0 auto 18px;
  }

  .speaker-filter-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    max-width: 680px;
    margin: 0 auto 16px;
    flex-wrap: wrap;
  }
  .speaker-filter-item {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
  }
  .speaker-filter-item:hover { border-color: var(--navy); color: var(--ink); }
  .speaker-filter-item.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--on-accent);
    font-weight: 700;
  }
  .playall-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 22px;
    border-radius: var(--r-pill);
    border: 1px solid var(--navy);
    background: var(--card);
    color: var(--navy);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .playall-btn:hover { background: var(--accent-soft); }
  .playall-btn.active {
    background: var(--navy);
    color: var(--on-accent);
  }
  .playall-btn svg { width: 14px; height: 14px; }
  .playall-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 680px;
    margin: 0 auto;
  }

  .phrase-row { display: flex; gap: 12px; align-items: flex-start; transition: background 0.2s ease; }
  .phrase-row.staff { justify-content: flex-start; }
  .phrase-row.customer { justify-content: flex-end; }
  .phrase-row.speaking .phrase-bubble {
    border-color: var(--navy);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .speaker-tag {
    flex-shrink: 0;
    width: 52px;
    text-align: center;
    font-size: 11px;
    padding: 4px 0;
    border-radius: var(--r-pill);
    font-weight: 700;
    margin-top: 4px;
  }
  .phrase-row.staff .speaker-tag {
    background: var(--accent-soft);
    color: var(--navy);
  }
  .phrase-row.customer .speaker-tag {
    background: var(--card-alt);
    color: var(--ink-soft);
    order: 2;
  }

  .phrase-bubble {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 18px;
    max-width: 480px;
  }
  .phrase-row.staff .phrase-bubble {
    border-top-left-radius: 4px;
  }
  .phrase-row.customer .phrase-bubble {
    border-top-right-radius: 4px;
    background: var(--card-alt);
  }

  .phrase-jp-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }

  .phrase-jp {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.6;
  }

  .phrase-jp .furi {
    position: relative;
    cursor: help;
    border-bottom: 1px dashed var(--line);
  }

  .phrase-jp .furi::after {

function buildFuriganaHTML(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const [word, kana] of KANJI_READINGS) {
      if (text.startsWith(word, i) && /[\u4E00-\u9FFF]/.test(word)) {
        result += `<span class="furi" data-kana="${kana}">${word}</span>`;
        i += word.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      result += text[i];
      i += 1;
    }
  }
  return result;
}

<script>
const CAT_KEYS = Object.keys(VOCAB_DATA);
let currentCat = "item";
let currentMode = "ref";        // "ref" | "study"
let refSubMode = "lookup";      // "lookup" | "confuse"
let studySubMode = "memorize";  // "memorize" | "quiz"

let studyOrder = [];
let studyIndex = 0;
let isFlipped = false;

let quizQueue = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;
let quizDirection = "jp2zh"; // "jp2zh" | "zh2jp"
let autoAdvanceTimer = null;
let favOnly = false;         // 只練收藏模式

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refreshCatTabbarVisibility() {
  const needsCat = (currentMode === 'ref' && refSubMode === 'lookup') ||
                    (currentMode === 'study' && (studySubMode === 'memorize' || studySubMode === 'quiz'));
  document.getElementById('catTabbar').style.display = (needsCat && !favOnly) ? 'flex' : 'none';
}

function refreshDirectionToggleVisibility() {
  const showToggle = currentMode === 'study' && studySubMode === 'quiz';
  document.getElementById('directionToggleBtn').style.display = showToggle ? 'inline-block' : 'none';
  document.getElementById('favOnlyBtn').style.display = currentMode === 'study' ? 'inline-block' : 'none';
}

/* ---------- top-level mode tabs ---------- */
document.querySelectorAll('#modeTabbar .tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    stopPlayAll();
    document.querySelectorAll('#modeTabbar .tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentMode).classList.add('active');

    refreshCatTabbarVisibility();
    refreshDirectionToggleVisibility();
    enterCurrentMode();
  });
});

/* ---------- inner sub-mode tabs ---------- */
document.getElementById('refInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#refInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  refSubMode = item.dataset.submode;
  document.querySelectorAll('#view-ref .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('ref-' + refSubMode).classList.add('active');
  refreshCatTabbarVisibility();
  enterCurrentMode();
});

document.getElementById('studyInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#studyInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  studySubMode = item.dataset.submode;
  document.querySelectorAll('#view-study .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('study-' + studySubMode).classList.add('active');
  refreshCatTabbarVisibility();
  refreshDirectionToggleVisibility();
  enterCurrentMode();
});

/* ---------- dispatch ---------- */
function enterCurrentMode() {
  if (currentMode === 'ref') {
    if (refSubMode === 'lookup') renderRef();
    if (refSubMode === 'confuse') renderConfuse();
  } else if (currentMode === 'study') {
    if (studySubMode === 'memorize') initStudy();
    if (studySubMode === 'quiz') initQuiz();
  } else if (currentMode === 'phrase') {
    renderPhrase();
  }
}

/* ---------- category sub-tabs ---------- */
function buildCatTabs() {
  const bar = document.getElementById('catTabbar');
  bar.innerHTML = '';
  CAT_KEYS.forEach(key => {
    const cat = VOCAB_DATA[key];
    const el = document.createElement('div');
    el.className = 'subtab-item' + (key === currentCat ? ' active' : '');
    el.textContent = cat.label;
    el.addEventListener('click', () => {
      currentCat = key;
      buildCatTabs();
      enterCurrentMode();
    });
    bar.appendChild(el);
  });
}

/* ================= 共用元件：星號 / 發音 ================= */
const STAR_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2.5 15 9 22 9.8 16.8 14.5 18.3 21.5 12 17.9 5.7 21.5 7.2 14.5 2 9.8 9 9 12 2.5"></polygon></svg>`;
const SPEAK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18 6a8.5 8.5 0 0 1 0 12"></path></svg>`;

/* 等待 common.js 就緒（若未載入則所有收藏功能靜默停用） */
function hub() { return window.JPHub || null; }

/* 單字收藏 id 加上分類前綴，避免同一詞出現在不同分類時互相覆蓋 */
function wordId(catKey, jp) { return `${catKey}::${jp}`; }

function makeStarBtn(type, id, data) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'icon-btn';
  btn.innerHTML = STAR_SVG;
  btn.setAttribute('aria-label', '收藏');
  btn.title = '收藏';

  const sync = () => {
    const h = hub();
    btn.classList.toggle('starred', !!(h && h.isFav(type, id)));
  };
  sync();
  window.addEventListener('jphub-ready', sync);
  window.addEventListener('favs-synced', sync);

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const h = hub();
    if (!h) return;
    const on = h.toggleFav(type, id, data);
    btn.classList.toggle('starred', on);
  });
  return btn;
}

function makeSpeakBtn(text) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'icon-btn';
  btn.innerHTML = SPEAK_SVG;
  btn.setAttribute('aria-label', '播放發音');
  btn.title = '播放發音';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    stopPlayAll();
    speakWord(text, btn);
  });
  return btn;
}

/* 單字用發音（中性音色，與對話的 staff/customer 區分開） */
function speakWord(text, btn) {
  if (!('speechSynthesis' in window)) {
    alert('您的瀏覽器不支援語音播放功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  const voices = getJaVoices();
  if (voices.length) utter.voice = voices[0];
  utter.pitch = 1.0;
  utter.rate = 0.9;

  document.querySelectorAll('.icon-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  const clear = () => { if (btn) btn.classList.remove('playing'); };
  utter.onend = clear;
  utter.onerror = clear;
  window.speechSynthesis.speak(utter);
}

let currentShapeFilter = "all";
let refZhPinned = false;

const SHAPE_LABELS = {
  all: "全部",

  outer: "外套",
  bottoms: "下身",
};

function getRefItems() {

}

function renderShapeFilter() {
  const cat = VOCAB_DATA[currentCat];
  const row = document.getElementById('shapeFilterRow');
  const shapesPresent = [...new Set(cat.items.filter(it => it.shape).map(it => it.shape))];

  if (shapesPresent.length === 0) {

function refCellBody(item, revealed) {
  return revealed
    ? `<span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`
    : `<span class="ref-cell-jp">${item.jp}</span>`;
}

function attachRefTools(cell, item) {
  const tools = document.createElement('div');
  tools.className = 'ref-cell-tools';
  tools.appendChild(makeSpeakBtn(item.jp));
  tools.appendChild(makeStarBtn('word', wordId(currentCat, item.jp),
    { jp: item.jp, kana: item.kana, zh: item.zh, cat: VOCAB_DATA[currentCat].label }));
  cell.appendChild(tools);
}

function renderRefCell(cell, item) {
  if (refZhPinned) {
    cell.classList.add('revealed');
    cell.innerHTML = refCellBody(item, true);
  } else {
    cell.classList.remove('revealed');
    cell.innerHTML = refCellBody(item, false);
  }
  attachRefTools(cell, item);
}

function renderRef(keepFilter) {
  if (!keepFilter) currentShapeFilter = "all";
  renderShapeFilter();

  const items = getRefItems();
  const grid = document.getElementById('refGrid');
  grid.classList.toggle('zh-pinned', refZhPinned);
  grid.innerHTML = '';
  items.forEach((item) => {
    const cell = document.createElement('div');
    cell.className = 'ref-cell';
    renderRefCell(cell, item);
    cell.addEventListener('click', () => {
      if (refZhPinned) return; // 中文常駐模式下不需要點擊翻牌
      const revealed = cell.classList.toggle('revealed');
      cell.innerHTML = refCellBody(item, revealed);
      attachRefTools(cell, item);
    });
    grid.appendChild(cell);
  });
}

document.getElementById('toggleRefZh').addEventListener('click', (e) => {

/* ================= QUIZ ================= */
function initQuiz() {
  const { quizTooFew } = updateStudyEmptyState();
  if (quizTooFew) return;

  const items = getStudyItems();
  quizQueue = shuffle(items.map((_, i) => i));
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('quizResultView').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const items = getStudyItems();
  const itemIdx = quizQueue[quizIndex];
  const item = items[itemIdx];
  if (!item) return;
  quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  const label = document.getElementById('quizQuestionLabel');
  const kanaEl = document.getElementById('quizKana');

  if (quizDirection === 'jp2zh') {
    label.textContent = '這個單字的中文意思是？';
    document.getElementById('quizJp').textContent = item.jp;
    kanaEl.textContent = item.kana;
    kanaEl.style.display = '';
  } else {
    label.textContent = '這個中文對應的日文是？';
    document.getElementById('quizJp').textContent = item.zh;
    kanaEl.textContent = '';
    kanaEl.style.display = 'none';
  }

  document.getElementById('quizFeedback').innerHTML = '';
  document.getElementById('nextQuestionBtn').disabled = true;
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1} 題 / 共 ${quizQueue.length} 題`;

  const correctAnswer = quizDirection === 'jp2zh' ? item.zh : item.jp;
  const pool = items
    .filter((_, i) => i !== itemIdx)
    .map(x => quizDirection === 'jp2zh' ? x.zh : x.jp);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correctAnswer, ...wrongs]);

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, correctAnswer, item));
    optWrap.appendChild(btn);
  });

  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex}`;
}

function handleAnswer(btn, chosen, correct, item) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  const feedback = document.getElementById('quizFeedback');

  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    feedback.textContent = '答對了';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });

    // 答錯：顯示正確答案，並提供一鍵收藏這個單字
    feedback.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'quiz-feedback-row';
    const txt = document.createElement('span');
    txt.textContent = `正確答案：${correct}`;
    wrap.appendChild(txt);
    if (item) {
      const cat = catOfWord(item.jp);
      const star = makeStarBtn('word', wordId(cat, item.jp),
        { jp: item.jp, kana: item.kana, zh: item.zh, cat: VOCAB_DATA[cat].label });
      star.title = '收藏這個單字';
      wrap.appendChild(star);
      wrap.appendChild(makeSpeakBtn(item.jp));
    }
    feedback.appendChild(wrap);
  }
  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex + 1}`;
  document.getElementById('nextQuestionBtn').disabled = false;

  if (chosen === correct) {
    autoAdvanceTimer = setTimeout(() => {
      autoAdvanceTimer = null;
      goToNextQuestion();
    }, 600);
  }
}

function goToNextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

document.getElementById('nextQuestionBtn').addEventListener('click', () => {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  goToNextQuestion();
});

document.getElementById('directionToggleBtn').addEventListener('click', (e) => {

function showQuizResult() {
  document.getElementById('quizContent').style.display = 'none';
  document.getElementById('quizResultView').style.display = 'block';
  const total = quizQueue.length;
  document.getElementById('finalScore').textContent = `${quizScore} / ${total}`;
  let msg = '繼續加油，多複習幾次吧';
  const ratio = quizScore / total;
  if (ratio === 1) msg = '完美，這個分類已經記熟了';
  else if (ratio >= 0.8) msg = '很不錯，幾乎全對';
  else if (ratio >= 0.5) msg = '還可以，再複習一輪會更熟練';
  document.getElementById('resultMsg').textContent = msg;
}

/* ---------- 語音設定：店員 / 客人音色區分 ---------- */
let cachedJaVoices = null;

function getJaVoices() {
  if (cachedJaVoices && cachedJaVoices.length) return cachedJaVoices;
  if (!('speechSynthesis' in window)) return [];
  const all = window.speechSynthesis.getVoices();
  cachedJaVoices = all.filter(v => v.lang && v.lang.toLowerCase().startsWith('ja'));
  return cachedJaVoices;
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => { cachedJaVoices = null; };
}

// 依說話者套用不同音色／音調／語速，盡量挑選不同的日文語音；
// 若瀏覽器只提供一種日文語音，則用 pitch 與 rate 製造區別
function configureUtteranceForSpeaker(utter, speaker) {
  const voices = getJaVoices();
  if (voices.length >= 2) {
    const femaleHint = voices.find(v => /female|女|f\b/i.test(v.name));
    const maleHint = voices.find(v => /male|男|m\b/i.test(v.name) && v !== femaleHint);
    if (speaker === 'staff') {
      utter.voice = femaleHint || voices[0];
    } else {
      utter.voice = maleHint || voices[1] || voices[0];
    }
  } else if (voices.length === 1) {
    utter.voice = voices[0];
  }

  if (speaker === 'staff') {
    utter.pitch = 1.15;
    utter.rate = 0.95;
  } else {
    utter.pitch = 0.85;
    utter.rate = 0.97;
  }
}

function speakJapanese(text, speaker, btn, row) {
  if (!('speechSynthesis' in window)) {
    alert('您的瀏覽器不支援語音播放功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  configureUtteranceForSpeaker(utter, speaker);

  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  if (row) row.classList.add('speaking');

  utter.onend = () => {
    if (btn) btn.classList.remove('playing');
    if (row) row.classList.remove('speaking');
  };
  utter.onerror = () => {
    if (btn) btn.classList.remove('playing');
    if (row) row.classList.remove('speaking');
  };

  window.speechSynthesis.speak(utter);
}

/* ---------- 全部播放（依序播放整個情境） ---------- */
let playAllActive = false;
let playAllQueueIndex = 0;
let playAllAbort = false;

function setPlayAllButtonState(isPlaying) {
  const btn = document.getElementById('playAllBtn');
  const icon = document.getElementById('playAllIcon');
  const label = document.getElementById('playAllLabel');
  btn.classList.toggle('active', isPlaying);
  label.textContent = isPlaying ? '停止播放' : '全部播放本情境';
  icon.innerHTML = isPlaying
    ? '<rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect>'
    : '<polygon points="6 4 20 12 6 20 6 4"></polygon>';
}

function stopPlayAll() {
  if (!playAllActive) return;
  playAllAbort = true;
  playAllActive = false;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  setPlayAllButtonState(false);
}

function playAllScenario() {
  const items = getPhraseItems();
  const rows = Array.from(document.querySelectorAll('#phraseList .phrase-row'));

  if (!items.length) return;

  playAllActive = true;
  playAllAbort = false;
  playAllQueueIndex = 0;
  setPlayAllButtonState(true);

  function playNext() {
    if (playAllAbort) return;
    if (playAllQueueIndex >= items.length) {
      playAllActive = false;
      setPlayAllButtonState(false);
      return;
    }
    const item = items[playAllQueueIndex];
    const row = rows[playAllQueueIndex];
    const speakBtn = row ? row.querySelector('.speak-btn') : null;

    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    if (!('speechSynthesis' in window)) {
      alert('您的瀏覽器不支援語音播放功能');
      stopPlayAll();
      return;
    }

    const utter = new SpeechSynthesisUtterance(item.jp);
    utter.lang = 'ja-JP';
    configureUtteranceForSpeaker(utter, item.speaker);

    document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
    document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
    if (speakBtn) speakBtn.classList.add('playing');
    if (row) row.classList.add('speaking');

    utter.onend = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) {
        setTimeout(playNext, 350);
      }
    };
    utter.onerror = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) {
        setTimeout(playNext, 350);
      }
    };

    window.speechSynthesis.speak(utter);
  }

  playNext();
}

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (playAllActive) {
    stopPlayAll();
  } else {
    playAllScenario();
  }
});

function renderPhrase() {
  buildSceneTabs();
  buildScenarioTabs();
  renderPhraseList();
}

document.getElementById('toggleZh').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  e.target.dataset.on = String(!isOn);
  document.body.classList.toggle('show-zh', !isOn);
});

/* ---------- theme toggle ---------- */
const SUN_PATH = `
  <circle cx="12" cy="12" r="4.5"></circle>
  <line x1="12" y1="2.5" x2="12" y2="5"></line>
  <line x1="12" y1="19" x2="12" y2="21.5"></line>
  <line x1="4.2" y1="4.2" x2="6" y2="6"></line>
  <line x1="18" y1="18" x2="19.8" y2="19.8"></line>
  <line x1="2.5" y1="12" x2="5" y2="12"></line>
  <line x1="19" y1="12" x2="21.5" y2="12"></line>
  <line x1="4.2" y1="19.8" x2="6" y2="18"></line>
  <line x1="18" y1="6" x2="19.8" y2="4.2"></line>
`;
const MOON_PATH = `<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"></path>`;

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').innerHTML = theme === 'dark' ? MOON_PATH : SUN_PATH;
}

/* 主題偏好與 hub 共用同一個 localStorage 鍵，從首頁點進來不會跳色 */
const THEME_KEY = 'hub-dark';
const savedPref = localStorage.getItem(THEME_KEY);
const savedTheme = savedPref === '1' ? 'dark'
  : savedPref === '0' ? 'light'
  : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
applyTheme(savedTheme);

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next === 'dark' ? '1' : '0');
});

/* 收藏變動時，若正在「只練收藏」模式，重新整理題目來源 */
window.addEventListener('favs-changed', () => {
  if (favOnly && currentMode === 'study') {
    if (studySubMode === 'memorize') updateStudyEmptyState();
    // 測驗中途不重建題庫，避免打斷作答
  }
});
window.addEventListener('favs-synced', () => {
  if (favOnly && currentMode === 'study') enterCurrentMode();
});

/* ---------- init ---------- */
buildCatTabs();
renderRef();
refreshDirectionToggleVisibility();

</script>
