<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本溫泉・錢湯日語學習工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --onsen: #7B2D2D;
    --onsen-deep: #5C1F1F;
    --onsen-mid: #A04040;
    --bg: #F7F3EF;
    --card: #FFFFFF;
    --card-alt: #EDE8E3;
    --line: #DDD7D0;
    --ink: #2C2420;
    --ink-soft: #7A6A62;
    --muted: #A89890;
    --accent: #7B2D2D;
    --accent-soft: #F0E0DC;
    --on-accent: #FAF5F2;
    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-pill: 999px;
  }

  html[data-theme="dark"] {
    --bg: #1E1916;
    --card: #2A2320;
    --card-alt: #332B28;
    --line: #443A36;
    --ink: #EDE5DF;
    --ink-soft: #B0A099;
    --muted: #7A6A62;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans TC", "Noto Serif JP", serif;
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
  }

  /* ---------- Header ---------- */
  .topbar {
    background: var(--onsen-deep);
    color: var(--on-accent);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: baseline; gap: 10px; }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .topbar-sub {
    font-size: 12px;
    color: rgba(250,245,242,0.65);
    letter-spacing: 0.02em;
  }

  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: var(--r-pill);
    border: 1px solid rgba(250,245,242,0.25);
    background: rgba(250,245,242,0.08);
    color: var(--on-accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .theme-toggle:hover {
    background: rgba(250,245,242,0.16);
    border-color: rgba(250,245,242,0.4);
  }
  .theme-toggle svg { width: 17px; height: 17px; }

  /* ---------- Tab nav ---------- */
  .tabbar {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }

  .tab-item {
    flex: 1;
    text-align: center;
    padding: 16px 10px;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    user-select: none;
  }
  .tab-item:hover { color: var(--ink); }
  .tab-item.active {
    color: var(--ink);
    font-weight: 700;
    border-bottom-color: var(--onsen);
  }

  .subtabbar {
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }
  .subtab-item {
    padding: 11px 16px;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .subtab-item:hover { color: var(--ink); }
  .subtab-item.active {
    color: var(--onsen);
    font-weight: 700;
    border-bottom-color: var(--onsen);
  }

  /* ---------- Inner tab ---------- */
  .inner-tabbar {
    display: inline-flex;
    gap: 4px;
    background: var(--card-alt);
    border-radius: var(--r-pill);
    padding: 4px;
    margin-bottom: 22px;
  }
  .inner-tab-item {
    padding: 8px 20px;
    border-radius: var(--r-pill);
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .inner-tab-item:hover { color: var(--ink); }
  .inner-tab-item.active {
    background: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .inner-view { display: none; }
  .inner-view.active { display: block; }

  /* ---------- Main ---------- */
  .main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 24px 80px;
  }

  .section-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ---------- View switching ---------- */
  .view { display: none; }
  .view.active { display: block; }

  /* ====== STUDY (flashcard) view ====== */
  .study-layout {
    max-width: 560px;
    margin: 0 auto;
  }

  .card-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 48px 40px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
  }

  .card-index-tag {
    position: absolute;
    top: 20px;
    left: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-jp {
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-kana {
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }

  .card-zh {
    font-size: 24px;
    font-weight: 700;
    color: var(--onsen);
    min-height: 30px;
  }

  .card-hint {
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
  }

  .card-nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
  }

  .nav-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    width: 38px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover { border-color: var(--onsen); color: var(--onsen); }

  .nav-counter {
    font-size: 13px;
    color: var(--muted);
    min-width: 56px;
    text-align: center;
  }

  .shuffle-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    padding: 0 18px;
    height: 38px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .shuffle-btn:hover { border-color: var(--onsen); color: var(--onsen); }

  /* ====== Reference table view ====== */
  .ref-toolbar-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .ref-toolbar-row .section-label { margin-bottom: 0; }

  .shape-filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .shape-filter-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .shape-filter-item:hover { border-color: var(--onsen); color: var(--ink); }
  .shape-filter-item.active {
    background: var(--onsen);
    border-color: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ref-cell {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px 20px;
    min-height: 56px;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .ref-cell:hover { border-color: var(--onsen); }
  .ref-cell-jp { font-weight: 700; }
  .ref-cell.revealed {
    background: var(--card-alt);
    border-color: var(--onsen);
  }
  .ref-cell-kana { font-size: 13px; color: var(--ink-soft); }
  .ref-cell-zh { font-size: 16px; font-weight: 700; color: var(--ink); }

  .ref-grid.zh-pinned .ref-cell { cursor: default; }
  .ref-grid.zh-pinned .ref-cell:hover { border-color: var(--line); }

  /* ====== 收藏星號 / 單字發音 通用元件 ====== */
  .icon-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    width: 26px;
    height: 26px;
    border-radius: var(--r-pill);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .icon-btn:hover { border-color: var(--onsen); color: var(--onsen); }
  .icon-btn svg { width: 13px; height: 13px; }
  .icon-btn.playing { background: var(--onsen); border-color: var(--onsen); color: var(--on-accent); }
  .icon-btn.starred {
    color: #C8A32C;
    border-color: #C8A32C;
  }
  .icon-btn.starred svg { fill: #C8A32C; }

  /* 速查表格子上的小工具列 */
  .ref-cell { position: relative; }
  .ref-cell-tools {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .ref-cell:hover .ref-cell-tools,
  .ref-cell-tools:focus-within,
  .ref-cell-tools.always-show { opacity: 1; }
  .ref-cell-tools .icon-btn { width: 22px; height: 22px; }
  .ref-cell-tools .icon-btn svg { width: 11px; height: 11px; }

  @media (hover: none) {
    .ref-cell-tools { opacity: 1; }
  }

  /* 單字卡工具列 */
  .card-tools {
    position: absolute;
    top: 16px;
    right: 18px;
    display: flex;
    gap: 8px;
  }
  .card-tools .icon-btn { width: 30px; height: 30px; }
  .card-tools .icon-btn svg { width: 15px; height: 15px; }

  /* 常用句氣泡的星號 */
  .phrase-jp-row .icon-btn { margin-top: 1px; }

  /* 空狀態提示 */
  .empty-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: var(--r-md);
    padding: 40px 28px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ====== Quiz view ====== */
  .quiz-wrap { max-width: 560px; margin: 0 auto; }

  .study-toolbar-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .study-toolbar-row .inner-tabbar { margin-bottom: 0; }

  .direction-toggle-btn {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--onsen);
    background: var(--card);
    color: var(--onsen);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .direction-toggle-btn:hover { background: var(--accent-soft); }

  .quiz-progress {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .quiz-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 40px 32px;
    text-align: center;
    margin-bottom: 22px;
  }
  .quiz-question-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .quiz-jp { font-size: 28px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .quiz-kana { font-size: 14px; color: var(--ink-soft); }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .quiz-option {
    padding: 16px 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-size: 14px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--onsen); }
  .quiz-option.correct { background: #DCEADD; border-color: #4E7D54; color: #294A2D; }
  .quiz-option.wrong { background: #F1DCDC; border-color: #97393B; color: #6B2829; }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--onsen);
    min-height: 18px;
  }

  .quiz-feedback-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .quiz-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
  }
  .quiz-score { font-size: 13px; color: var(--ink-soft); }
  .quiz-score strong { color: var(--onsen); }

  .next-btn {
    padding: 9px 22px;
    border-radius: var(--r-pill);
    background: var(--onsen);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .next-btn:disabled { opacity: 0.35; cursor: default; }

  .quiz-result { text-align: center; padding: 50px 30px; }
  .quiz-result .big-score { font-size: 46px; font-weight: 700; color: var(--onsen); margin-bottom: 8px; }
  .quiz-result .result-msg { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }
  .restart-btn {
    padding: 10px 28px;
    border-radius: var(--r-pill);
    background: var(--onsen);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  /* ====== Confusables view ====== */
  .confuse-row {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 22px;
    margin-bottom: 12px;
  }
  .confuse-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .confuse-items { display: flex; gap: 12px; flex-wrap: wrap; }
  .confuse-pill {
    background: var(--card-alt);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 10px 18px;
    font-size: 14px;
  }
  .confuse-pill .k { font-weight: 700; color: var(--ink); }
  .confuse-pill .z { font-size: 12px; color: var(--muted); margin-left: 6px; }

  /* ====== Phrase view ====== */
  .phrase-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .phrase-toggle-group { display: flex; gap: 8px; flex-shrink: 0; }
  .phrase-toggle-btn {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .phrase-toggle-btn:hover { border-color: var(--onsen); color: var(--ink); }
  .phrase-toggle-btn[data-on="true"] {
    background: var(--onsen);
    border-color: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .speaker-filter-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    max-width: 680px;
    margin: 0 auto 16px;
    flex-wrap: wrap;
  }
  .speaker-filter-item {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
  }
  .speaker-filter-item:hover { border-color: var(--onsen); color: var(--ink); }
  .speaker-filter-item.active {
    background: var(--onsen);
    border-color: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scene-tabbar {
    display: flex;
    gap: 8px;
    margin: 0 auto 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }
  .scene-tab-item {
    padding: 9px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .scene-tab-item:hover { border-color: var(--onsen); color: var(--ink); }
  .scene-tab-item.active {
    background: var(--onsen);
    border-color: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scenario-tabbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 0 auto 16px;
    max-width: 680px;
  }
  .scenario-tab-item {
    padding: 9px 14px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scenario-tab-item:hover { border-color: var(--onsen); color: var(--ink); }
  .scenario-tab-item.active {
    background: var(--onsen);
    border-color: var(--onsen);
    color: var(--on-accent);
    font-weight: 700;
  }

  .playall-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    max-width: 680px;
    margin: 0 auto 18px;
  }
  .playall-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 22px;
    border-radius: var(--r-pill);
    border: 1px solid var(--onsen);
    background: var(--card);
    color: var(--onsen);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .playall-btn:hover { background: var(--accent-soft); }
  .playall-btn.active { background: var(--onsen); color: var(--on-accent); }
  .playall-btn svg { width: 14px; height: 14px; }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 680px;
    margin: 0 auto;
  }

  .phrase-row { display: flex; gap: 12px; align-items: flex-start; transition: background 0.2s ease; }
  .phrase-row.staff { justify-content: flex-start; }
  .phrase-row.customer { justify-content: flex-end; }
  .phrase-row.speaking .phrase-bubble {
    border-color: var(--onsen);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .speaker-tag {
    flex-shrink: 0;
    width: 52px;
    text-align: center;
    font-size: 11px;
    padding: 4px 0;
    border-radius: var(--r-pill);
    font-weight: 700;
    margin-top: 4px;
  }
  .phrase-row.staff .speaker-tag { background: var(--accent-soft); color: var(--onsen); }
  .phrase-row.customer .speaker-tag {
    background: var(--card-alt);
    color: var(--ink-soft);
    order: 2;
  }

  .phrase-bubble {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 18px;
    max-width: 480px;
  }
  .phrase-row.staff .phrase-bubble { border-top-left-radius: 4px; }
  .phrase-row.customer .phrase-bubble {
    border-top-right-radius: 4px;
    background: var(--card-alt);
  }

  .phrase-jp-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }

  .phrase-jp {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.6;
  }

  .phrase-jp .furi {
    position: relative;
    cursor: help;
    border-bottom: 1px dashed var(--line);
  }
  .phrase-jp .furi::after {
    content: attr(data-kana);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    margin-bottom: 6px;
    background: var(--onsen);
    color: var(--on-accent);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 9px;
    border-radius: var(--r-sm);
    white-space: nowrap;

function buildFuriganaHTML(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const [word, kana] of KANJI_READINGS) {
      if (text.startsWith(word, i) && /[\u4E00-\u9FFF]/.test(word)) {
        result += `<span class="furi" data-kana="${kana}">${word}</span>`;
        i += word.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      result += text[i];
      i += 1;
    }
  }
  return result;
}

<script>
// ============================================================
// APP STATE
// ============================================================
const CAT_KEYS = Object.keys(VOCAB_DATA);
let currentCat = "admission";
let currentMode = "ref";
let refSubMode = "lookup";
let studySubMode = "memorize";

let studyOrder = [];
let studyIndex = 0;
let isFlipped = false;

let quizQueue = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;
let quizDirection = "jp2zh"; // "jp2zh" | "zh2jp"
let autoAdvanceTimer = null;
let favOnly = false;         // 只練收藏模式

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refreshCatTabbarVisibility() {
  const needsCat = (currentMode === 'ref' && refSubMode === 'lookup') ||
                    (currentMode === 'study' && (studySubMode === 'memorize' || studySubMode === 'quiz'));
  document.getElementById('catTabbar').style.display = (needsCat && !favOnly) ? 'flex' : 'none';
}

function refreshDirectionToggleVisibility() {
  const showToggle = currentMode === 'study' && studySubMode === 'quiz';
  document.getElementById('directionToggleBtn').style.display = showToggle ? 'inline-block' : 'none';
  document.getElementById('favOnlyBtn').style.display = currentMode === 'study' ? 'inline-block' : 'none';
}

// ============================================================
// MODE TABS
// ============================================================
document.querySelectorAll('#modeTabbar .tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    stopPlayAll();
    document.querySelectorAll('#modeTabbar .tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentMode).classList.add('active');
    refreshCatTabbarVisibility();
    refreshDirectionToggleVisibility();
    enterCurrentMode();
  });
});

document.getElementById('refInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#refInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  refSubMode = item.dataset.submode;
  document.querySelectorAll('#view-ref .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('ref-' + refSubMode).classList.add('active');
  refreshCatTabbarVisibility();
  enterCurrentMode();
});

document.getElementById('studyInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#studyInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  studySubMode = item.dataset.submode;
  document.querySelectorAll('#view-study .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('study-' + studySubMode).classList.add('active');
  refreshCatTabbarVisibility();
  refreshDirectionToggleVisibility();
  enterCurrentMode();
});

function enterCurrentMode() {
  if (currentMode === 'ref') {
    if (refSubMode === 'lookup') renderRef();
    if (refSubMode === 'confuse') renderConfuse();
  } else if (currentMode === 'study') {
    if (studySubMode === 'memorize') initStudy();
    if (studySubMode === 'quiz') initQuiz();
  } else if (currentMode === 'phrase') {
    renderPhrase();
  }
}

// ============================================================
// CATEGORY TABS
// ============================================================
function buildCatTabs() {
  const bar = document.getElementById('catTabbar');
  bar.innerHTML = '';
  CAT_KEYS.forEach(key => {
    const el = document.createElement('div');
    el.className = 'subtab-item' + (key === currentCat ? ' active' : '');
    el.textContent = VOCAB_DATA[key].label;
    el.addEventListener('click', () => {
      currentCat = key;
      buildCatTabs();
      enterCurrentMode();
    });
    bar.appendChild(el);
  });
}

// ============================================================
// 共用元件：星號 / 發音
// ============================================================
const STAR_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2.5 15 9 22 9.8 16.8 14.5 18.3 21.5 12 17.9 5.7 21.5 7.2 14.5 2 9.8 9 9 12 2.5"></polygon></svg>`;
const SPEAK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18 6a8.5 8.5 0 0 1 0 12"></path></svg>`;

function hub() { return window.JPHub || null; }

function wordId(catKey, jp) { return `${catKey}::${jp}`; }

function makeStarBtn(type, id, data) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'icon-btn';
  btn.innerHTML = STAR_SVG;
  btn.setAttribute('aria-label', '收藏');
  btn.title = '收藏';

  const sync = () => {
    const h = hub();
    btn.classList.toggle('starred', !!(h && h.isFav(type, id)));
  };
  sync();
  window.addEventListener('jphub-ready', sync);
  window.addEventListener('favs-synced', sync);

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const h = hub();
    if (!h) return;
    const on = h.toggleFav(type, id, data);
    btn.classList.toggle('starred', on);
  });
  return btn;
}

function makeSpeakBtn(text) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'icon-btn';
  btn.innerHTML = SPEAK_SVG;
  btn.setAttribute('aria-label', '播放發音');
  btn.title = '播放發音';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    stopPlayAll();
    speakWord(text, btn);
  });
  return btn;
}

// 單字用發音（中性音色，與對話的 staff/customer 區分開）
function speakWord(text, btn) {
  if (!('speechSynthesis' in window)) {
    alert('您的瀏覽器不支援語音播放功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  const voices = getJaVoices();
  if (voices.length) utter.voice = voices[0];
  utter.pitch = 1.0;
  utter.rate = 0.9;

  document.querySelectorAll('.icon-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  const clear = () => { if (btn) btn.classList.remove('playing'); };
  utter.onend = clear;
  utter.onerror = clear;
  window.speechSynthesis.speak(utter);
}

// ============================================================
// REF VIEW
// ============================================================
let currentShapeFilter = "all";
let refZhPinned = false;

const SHAPE_LABELS = {
  all: "全部",
  onsen: "溫泉系",
  sento: "錢湯系",
  before: "入浴前",
  rule: "禁止規定",
  caution: "注意事項",
};

function getRefItems() {
  const cat = VOCAB_DATA[currentCat];
  if (currentShapeFilter === "all") return cat.items;
  return cat.items.filter(it => it.shape === currentShapeFilter);
}

function renderShapeFilter() {
  const cat = VOCAB_DATA[currentCat];
  const row = document.getElementById('shapeFilterRow');
  const shapesPresent = [...new Set(cat.items.filter(it => it.shape).map(it => it.shape))];
  if (shapesPresent.length === 0) { row.style.display = 'none'; row.innerHTML = ''; return; }
  row.style.display = 'flex';
  row.innerHTML = '';
  ["all", ...shapesPresent].forEach(key => {
    const pill = document.createElement('div');
    pill.className = 'shape-filter-item' + (key === currentShapeFilter ? ' active' : '');
    pill.textContent = SHAPE_LABELS[key] || key;
    pill.addEventListener('click', () => { currentShapeFilter = key; renderShapeFilter(); renderRef(true); });
    row.appendChild(pill);
  });
}

function refCellBody(item, revealed) {
  return revealed
    ? `<span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`
    : `<span class="ref-cell-jp">${item.jp}</span>`;
}

function attachRefTools(cell, item) {
  const tools = document.createElement('div');
  tools.className = 'ref-cell-tools';
  tools.appendChild(makeSpeakBtn(item.jp));
  tools.appendChild(makeStarBtn('word', wordId(currentCat, item.jp),
    { jp: item.jp, kana: item.kana, zh: item.zh, cat: VOCAB_DATA[currentCat].label }));
  cell.appendChild(tools);
}

function renderRefCell(cell, item) {
  if (refZhPinned) {
    cell.classList.add('revealed');
    cell.innerHTML = refCellBody(item, true);
  } else {
    cell.classList.remove('revealed');
    cell.innerHTML = refCellBody(item, false);
  }
  attachRefTools(cell, item);
}

function renderRef(keepFilter) {
  if (!keepFilter) currentShapeFilter = "all";
  renderShapeFilter();
  const items = getRefItems();
  const grid = document.getElementById('refGrid');
  grid.classList.toggle('zh-pinned', refZhPinned);
  grid.innerHTML = '';
  items.forEach((item) => {
    const cell = document.createElement('div');
    cell.className = 'ref-cell';
    renderRefCell(cell, item);
    cell.addEventListener('click', () => {
      if (refZhPinned) return;
      const revealed = cell.classList.toggle('revealed');
      cell.innerHTML = refCellBody(item, revealed);
      attachRefTools(cell, item);
    });
    grid.appendChild(cell);
  });
}

document.getElementById('toggleRefZh').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  refZhPinned = !isOn;
  e.target.dataset.on = String(refZhPinned);
  document.getElementById('refLookupHint').textContent = refZhPinned
    ? '已顯示全部假名與中文意思'
    : '點擊單字查看假名與中文意思';
  renderRef(true);
});

// ============================================================
// STUDY
// ============================================================
function getStudyItems() {
  const cat = VOCAB_DATA[currentCat];
  if (!favOnly) return cat.items;
  const h = hub();
  if (!h) return [];
  const out = [];
  Object.entries(h.getFavs()).forEach(([, v]) => {
    if (v && v.type === 'word' && v.page === h.PAGE && v.jp) {
      out.push({ jp: v.jp, kana: v.kana, zh: v.zh });
    }
  });
  return out;
}

function catOfWord(jp) {
  for (const key of CAT_KEYS) {
    if (VOCAB_DATA[key].items.some(it => it.jp === jp)) return key;
  }
  return currentCat;
}

function updateStudyEmptyState() {
  const items = getStudyItems();
  const empty = favOnly && items.length < 1;
  const quizTooFew = favOnly && items.length < 4;

  document.getElementById('studyEmpty').style.display = empty ? 'block' : 'none';
  document.getElementById('studyBody').style.display = empty ? 'none' : 'block';
  document.getElementById('studyHint').style.display = empty ? 'none' : 'block';

  const qEmpty = document.getElementById('quizEmpty');
  const qContent = document.getElementById('quizContent');
  const qProgress = document.getElementById('quizProgress');
  if (quizTooFew) {
    qEmpty.textContent = items.length
      ? '收藏的單字少於 4 個，無法組成選擇題。請再多收藏幾個單字。'
      : '尚未收藏任何單字。在速查表或單字卡上點擊星號即可加入收藏。';
    qEmpty.style.display = 'block';
    qContent.style.display = 'none';
    document.getElementById('quizResultView').style.display = 'none';
    qProgress.style.display = 'none';
  } else {
    qEmpty.style.display = 'none';
    qProgress.style.display = 'block';
  }
  return { empty, quizTooFew };
}

document.getElementById('favOnlyBtn').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  favOnly = !isOn;
  e.target.dataset.on = String(favOnly);
  refreshCatTabbarVisibility();
  document.getElementById('studyHint').textContent = favOnly
    ? '只練收藏的單字，點擊卡片查看中文意思'
    : '點擊卡片查看中文意思';
  enterCurrentMode();
});

function initStudy() {
  const { empty } = updateStudyEmptyState();
  if (empty) return;
  const items = getStudyItems();
  studyOrder = items.map((_, i) => i);
  studyIndex = 0;
  isFlipped = false;
  renderStudyCard();
}

function renderStudyCard() {
  const items = getStudyItems();
  if (!items.length) return;
  if (studyIndex >= items.length) studyIndex = 0;
  const item = items[studyOrder[studyIndex]];
  if (!item) return;
  isFlipped = false;

  document.getElementById('cardJp').textContent = item.jp;
  document.getElementById('cardKana').textContent = item.kana;
  document.getElementById('cardZh').textContent = '';
  document.getElementById('cardHint').textContent = '點擊卡片看中文';

  const tools = document.getElementById('cardTools');
  tools.innerHTML = '';
  tools.appendChild(makeSpeakBtn(item.jp));
  tools.appendChild(makeStarBtn('word', wordId(catOfWord(item.jp), item.jp),
    { jp: item.jp, kana: item.kana, zh: item.zh, cat: VOCAB_DATA[catOfWord(item.jp)].label }));

  const pos = studyIndex + 1;
  const total = studyOrder.length;
  document.getElementById('cardIndexTag').textContent = `${pos} / ${total}`;
  document.getElementById('navCounter').textContent = `${pos} / ${total}`;
}

document.getElementById('flashcard').addEventListener('click', () => {
  const items = getStudyItems();
  const item = items[studyOrder[studyIndex]];
  if (!item) return;
  isFlipped = !isFlipped;
  document.getElementById('cardZh').textContent = isFlipped ? item.zh : '';
  document.getElementById('cardHint').textContent = isFlipped ? '點擊卡片隱藏中文' : '點擊卡片看中文';
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (!studyOrder.length) return;
  studyIndex = (studyIndex + 1) % studyOrder.length;
  renderStudyCard();
});
document.getElementById('prevBtn').addEventListener('click', () => {
  if (!studyOrder.length) return;
  studyIndex = (studyIndex - 1 + studyOrder.length) % studyOrder.length;
  renderStudyCard();
});
document.getElementById('shuffleBtn').addEventListener('click', () => {
  studyOrder = shuffle(studyOrder);
  studyIndex = 0;
  renderStudyCard();
});

// ============================================================
// QUIZ
// ============================================================
function initQuiz() {
  const { quizTooFew } = updateStudyEmptyState();
  if (quizTooFew) return;

  const items = getStudyItems();
  quizQueue = shuffle(items.map((_, i) => i));
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('quizResultView').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const items = getStudyItems();
  const itemIdx = quizQueue[quizIndex];
  const item = items[itemIdx];
  if (!item) return;
  quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  const label = document.getElementById('quizQuestionLabel');
  const kanaEl = document.getElementById('quizKana');

  if (quizDirection === 'jp2zh') {
    label.textContent = '這個單字的中文意思是？';
    document.getElementById('quizJp').textContent = item.jp;
    kanaEl.textContent = item.kana;
    kanaEl.style.display = '';
  } else {
    label.textContent = '這個中文對應的日文是？';
    document.getElementById('quizJp').textContent = item.zh;
    kanaEl.textContent = '';
    kanaEl.style.display = 'none';
  }

  document.getElementById('quizFeedback').innerHTML = '';
  document.getElementById('nextQuestionBtn').disabled = true;
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1} 題 / 共 ${quizQueue.length} 題`;

  const correctAnswer = quizDirection === 'jp2zh' ? item.zh : item.jp;
  const pool = items
    .filter((_, i) => i !== itemIdx)
    .map(x => quizDirection === 'jp2zh' ? x.zh : x.jp);
  const wrongs = shuffle(pool).slice(0, 3);
  const options = shuffle([correctAnswer, ...wrongs]);

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, correctAnswer, item));
    optWrap.appendChild(btn);
  });

  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex}`;
}

function handleAnswer(btn, chosen, correct, item) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  const feedback = document.getElementById('quizFeedback');

  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    feedback.textContent = '答對了';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });

    feedback.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'quiz-feedback-row';
    const txt = document.createElement('span');
    txt.textContent = `正確答案：${correct}`;
    wrap.appendChild(txt);
    if (item) {
      const cat = catOfWord(item.jp);
      const star = makeStarBtn('word', wordId(cat, item.jp),
        { jp: item.jp, kana: item.kana, zh: item.zh, cat: VOCAB_DATA[cat].label });
      star.title = '收藏這個單字';
      wrap.appendChild(star);
      wrap.appendChild(makeSpeakBtn(item.jp));
    }
    feedback.appendChild(wrap);
  }
  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex + 1}`;
  document.getElementById('nextQuestionBtn').disabled = false;

  if (chosen === correct) {
    autoAdvanceTimer = setTimeout(() => {
      autoAdvanceTimer = null;
      goToNextQuestion();
    }, 600);
  }
}

function goToNextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showQuizResult();
  } else {
    renderQuizQuestion();
  }
}

document.getElementById('nextQuestionBtn').addEventListener('click', () => {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  goToNextQuestion();
});

document.getElementById('directionToggleBtn').addEventListener('click', (e) => {
  quizDirection = quizDirection === 'jp2zh' ? 'zh2jp' : 'jp2zh';
  e.target.textContent = quizDirection === 'jp2zh' ? '切換為「中→日」' : '切換為「日→中」';
  initQuiz();
});

function showQuizResult() {
  document.getElementById('quizContent').style.display = 'none';
  document.getElementById('quizResultView').style.display = 'block';
  const total = quizQueue.length;
  document.getElementById('finalScore').textContent = `${quizScore} / ${total}`;
  let msg = '繼續加油，多複習幾次吧';
  const ratio = quizScore / total;
  if (ratio === 1) msg = '完美，這個分類已經記熟了';
  else if (ratio >= 0.8) msg = '很不錯，幾乎全對';
  else if (ratio >= 0.5) msg = '還可以，再複習一輪會更熟練';
  document.getElementById('resultMsg').textContent = msg;
}

// PHRASE
// ============================================================
const SPEAKER_LABELS = { staff: "店員", customer: "客人" };
let speakerFilter = "all";

function getPhraseItems() {
  const scene = PHRASE_DATA[currentPhraseScene];
  const scenario = scene.scenarios[currentScenarioIndex];
  const items = scenario.items.map((it, i) => ({ ...it, _idx: i }));
  if (speakerFilter === "all") return items;
  return items.filter(it => it.speaker === speakerFilter);
}

document.getElementById('speakerFilterRow').addEventListener('click', (e) => {
  const item = e.target.closest('.speaker-filter-item');
  if (!item) return;
  stopPlayAll();
  document.querySelectorAll('#speakerFilterRow .speaker-filter-item').forEach(el => el.classList.remove('active'));
  item.classList.add('active');
  speakerFilter = item.dataset.speaker;
  renderPhraseList();
});

function buildSceneTabs() {
  const bar = document.getElementById('sceneTabbar');
  bar.innerHTML = '';
  PHRASE_KEYS.forEach(key => {
    const el = document.createElement('div');
    el.className = 'scene-tab-item' + (key === currentPhraseScene ? ' active' : '');
    el.textContent = PHRASE_DATA[key].label;
    el.addEventListener('click', () => {
      stopPlayAll();
      currentPhraseScene = key; currentScenarioIndex = 0;
      buildSceneTabs(); buildScenarioTabs(); renderPhraseList();
    });
    bar.appendChild(el);
  });
}

function buildScenarioTabs() {
  const bar = document.getElementById('scenarioTabbar');
  bar.innerHTML = '';
  PHRASE_DATA[currentPhraseScene].scenarios.forEach((sc, i) => {
    const el = document.createElement('div');
    el.className = 'scenario-tab-item' + (i === currentScenarioIndex ? ' active' : '');
    el.textContent = sc.label;
    el.addEventListener('click', () => {
      stopPlayAll();
      currentScenarioIndex = i; buildScenarioTabs(); renderPhraseList();
    });
    bar.appendChild(el);
  });
}

const SPEAKER_ICON_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18 6a8.5 8.5 0 0 1 0 12"></path></svg>`;

function renderPhraseList() {
  const scene = PHRASE_DATA[currentPhraseScene];
  const scenario = scene.scenarios[currentScenarioIndex];
  const items = getPhraseItems();
  const list = document.getElementById('phraseList');
  list.innerHTML = '';
  items.forEach((item) => {
    const row = document.createElement('div');
    row.className = 'phrase-row ' + item.speaker;
    row.dataset.index = item._idx;
    row.innerHTML = `
      <span class="speaker-tag">${SPEAKER_LABELS[item.speaker]}</span>
      <div class="phrase-bubble">
        <div class="phrase-jp-row">
          <span class="phrase-jp">${buildFuriganaHTML(item.jp)}</span>
          <button class="speak-btn" type="button" aria-label="播放發音" title="播放發音">${SPEAKER_ICON_SVG}</button>
        </div>
        <div class="phrase-zh">${item.zh}</div>
      </div>
    `;

    row.querySelectorAll('.furi').forEach(furiEl => {
      let pressTimer = null;
      furiEl.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => furiEl.classList.add('show-tooltip'), 350);
      });
      furiEl.addEventListener('touchend', () => {
        clearTimeout(pressTimer);
        setTimeout(() => furiEl.classList.remove('show-tooltip'), 1200);
      });
    });

    const speakBtn = row.querySelector('.speak-btn');
    speakBtn.addEventListener('click', () => {
      stopPlayAll();
      speakJapanese(item.jp, item.speaker, speakBtn, row);
    });

    const phraseId = `${currentPhraseScene}-${currentScenarioIndex}-${item._idx}`;
    const starBtn = makeStarBtn('phrase', phraseId, {
      jp: item.jp, kana: item.kana, zh: item.zh,
      scene: scene.label, scenario: scenario.label
    });
    row.querySelector('.phrase-jp-row').appendChild(starBtn);

    list.appendChild(row);
  });
}

// ============================================================
// TTS
// ============================================================
let cachedJaVoices = null;
function getJaVoices() {
  if (cachedJaVoices && cachedJaVoices.length) return cachedJaVoices;
  if (!('speechSynthesis' in window)) return [];
  const all = window.speechSynthesis.getVoices();
  cachedJaVoices = all.filter(v => v.lang && v.lang.toLowerCase().startsWith('ja'));
  return cachedJaVoices;
}
if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = () => { cachedJaVoices = null; }; }

function configureUtteranceForSpeaker(utter, speaker) {
  const voices = getJaVoices();
  if (voices.length >= 2) {
    const femaleHint = voices.find(v => /female|女|f\b/i.test(v.name));
    const maleHint = voices.find(v => /male|男|m\b/i.test(v.name) && v !== femaleHint);
    if (speaker === 'staff') {
      utter.voice = femaleHint || voices[0];
    } else {
      utter.voice = maleHint || voices[1] || voices[0];
    }
  } else if (voices.length === 1) {
    utter.voice = voices[0];
  }

  if (speaker === 'staff') {
    utter.pitch = 1.15;
    utter.rate = 0.95;
  } else {
    utter.pitch = 0.85;
    utter.rate = 0.97;
  }
}

function speakJapanese(text, speaker, btn, row) {
  if (!('speechSynthesis' in window)) {
    alert('您的瀏覽器不支援語音播放功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  configureUtteranceForSpeaker(utter, speaker);

  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  if (row) row.classList.add('speaking');

  utter.onend = () => {
    if (btn) btn.classList.remove('playing');
    if (row) row.classList.remove('speaking');
  };
  utter.onerror = () => {
    if (btn) btn.classList.remove('playing');
    if (row) row.classList.remove('speaking');
  };

  window.speechSynthesis.speak(utter);
}

// ============================================================
// PLAY ALL
// ============================================================
let playAllActive = false;
let playAllQueueIndex = 0;
let playAllAbort = false;

function setPlayAllButtonState(isPlaying) {
  const btn = document.getElementById('playAllBtn');
  const icon = document.getElementById('playAllIcon');
  const label = document.getElementById('playAllLabel');
  btn.classList.toggle('active', isPlaying);
  label.textContent = isPlaying ? '停止播放' : '全部播放本情境';
  icon.innerHTML = isPlaying
    ? '<rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect>'
    : '<polygon points="6 4 20 12 6 20 6 4"></polygon>';
}

function stopPlayAll() {
  if (!playAllActive) return;
  playAllAbort = true;
  playAllActive = false;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  setPlayAllButtonState(false);
}

function playAllScenario() {
  const items = getPhraseItems();
  const rows = Array.from(document.querySelectorAll('#phraseList .phrase-row'));

  if (!items.length) return;

  playAllActive = true;
  playAllAbort = false;
  playAllQueueIndex = 0;
  setPlayAllButtonState(true);

  function playNext() {
    if (playAllAbort) return;
    if (playAllQueueIndex >= items.length) {
      playAllActive = false;
      setPlayAllButtonState(false);
      return;
    }
    const item = items[playAllQueueIndex];
    const row = rows[playAllQueueIndex];
    const speakBtn = row ? row.querySelector('.speak-btn') : null;

    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    if (!('speechSynthesis' in window)) {
      alert('您的瀏覽器不支援語音播放功能');
      stopPlayAll();
      return;
    }

    const utter = new SpeechSynthesisUtterance(item.jp);
    utter.lang = 'ja-JP';
    configureUtteranceForSpeaker(utter, item.speaker);

    document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
    document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
    if (speakBtn) speakBtn.classList.add('playing');
    if (row) row.classList.add('speaking');

    utter.onend = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) {
        setTimeout(playNext, 350);
      }
    };
    utter.onerror = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) {
        setTimeout(playNext, 350);
      }
    };

    window.speechSynthesis.speak(utter);
  }

  playNext();
}

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (playAllActive) {
    stopPlayAll();
  } else {
    playAllScenario();
  }
});

function renderPhrase() {
  buildSceneTabs();

}

const MOON_PATH = `<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"></path>`;

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').innerHTML = theme === 'dark' ? MOON_PATH : SUN_PATH;
}

const THEME_KEY = 'hub-dark';
const savedPref = localStorage.getItem(THEME_KEY);
const savedTheme = savedPref === '1' ? 'dark'
  : savedPref === '0' ? 'light'
  : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
applyTheme(savedTheme);

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem(THEME_KEY, next === 'dark' ? '1' : '0');
});
