<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本美術館日語學習工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EE;
    --cream-deep: #EDE9E0;
    --parchment: #E2DDD4;
    --charcoal: #2C2C2C;
    --charcoal-soft: #4A4A4A;
    --stone: #8A8580;
    --muted: #B0ABA4;
    --card: #FDFCF9;
    --card-alt: #F0ECE5;
    --line: #D8D3CB;
    --accent: #5C3D2E;
    --accent-soft: #EDE0D8;
    --accent2: #3D5246;
    --accent2-soft: #D8E4DE;
    --on-accent: #FDFCF9;
    --topbar-bg: #2C2C2C;
    --r-sm: 4px;
    --r-md: 8px;
    --r-lg: 12px;
    --r-pill: 999px;
  }

  html[data-theme="dark"] {
    --cream: #1E1C18;
    --cream-deep: #252320;
    --parchment: #2E2B26;
    --charcoal: #E8E4DC;
    --charcoal-soft: #C0BAB0;
    --stone: #908B84;
    --muted: #68635C;
    --card: #242220;
    --card-alt: #2E2B26;
    --line: #3A3733;
    --accent-soft: #3A2820;
    --accent2-soft: #1E2C24;
    --topbar-bg: #5C3D2E;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--charcoal);
    font-family: "Noto Sans TC", "Noto Serif JP", serif;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* ---- Header ---- */
  .topbar {
    background: var(--topbar-bg);
    color: var(--on-accent);
    padding: 0 32px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    min-height: 64px;
  }

  .topbar-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    padding: 14px 0;
  }

  .topbar-eyebrow {
    font-family: "Cormorant Garamond", serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(253,252,249,0.45);
    text-transform: uppercase;
  }

  .topbar-title {
    font-family: "Cormorant Garamond", serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--on-accent);
    line-height: 1.2;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-toggle {
    width: 36px; height: 36px;
    border-radius: var(--r-pill);
    border: 1px solid rgba(253,252,249,0.2);
    background: rgba(253,252,249,0.06);
    color: var(--on-accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease;
  }
  .theme-toggle:hover { background: rgba(253,252,249,0.14); }
  .theme-toggle svg { width: 16px; height: 16px; }

  /* ---- Tab nav ---- */
  .tabbar {
    background: var(--cream-deep);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }

  .tab-item {
    flex: 1;
    text-align: center;
    padding: 14px 10px;
    font-size: 13px;
    color: var(--stone);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    user-select: none;
    letter-spacing: 0.04em;
  }
  .tab-item:hover { color: var(--charcoal); }
  .tab-item.active {
    color: var(--charcoal);
    font-weight: 700;
    border-bottom-color: var(--accent);
  }

  .subtabbar {
    background: var(--cream);
    border-bottom: 1px solid var(--line);
    display: flex;
    overflow-x: auto;
  }
  .subtab-item {
    padding: 10px 18px;
    font-size: 12px;
    color: var(--stone);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    user-select: none;
    letter-spacing: 0.03em;
  }
  .subtab-item:hover { color: var(--charcoal); }
  .subtab-item.active {
    color: var(--accent);
    font-weight: 700;
    border-bottom-color: var(--accent);
  }

  /* ---- Inner tab ---- */
  .inner-tabbar {
    display: inline-flex;
    gap: 2px;
    background: var(--parchment);
    border-radius: var(--r-pill);
    padding: 3px;
    margin-bottom: 22px;
  }
  .inner-tab-item {
    padding: 8px 22px;
    border-radius: var(--r-pill);
    font-size: 13px;
    color: var(--stone);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: background 0.15s ease, color 0.15s ease;
    letter-spacing: 0.03em;
  }
  .inner-tab-item:hover { color: var(--charcoal); }
  .inner-tab-item.active {
    background: var(--charcoal);
    color: var(--on-accent);
    font-weight: 700;
  }

  .inner-view { display: none; }
  .inner-view.active { display: block; }

  /* ---- Main ---- */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px 100px;
  }

  .section-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ===== REF ===== */
  .ref-toolbar-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .ref-toolbar-row .section-label { margin-bottom: 0; }

  .shape-filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .shape-filter-item {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.03em;
  }
  .shape-filter-item:hover { border-color: var(--accent); color: var(--charcoal); }
  .shape-filter-item.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
    font-weight: 700;
  }

  .ref-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ref-cell {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px 18px;
    min-height: 54px;
    font-size: 15px;
    color: var(--charcoal);
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .ref-cell:hover { border-color: var(--accent); }
  .ref-cell-jp { font-weight: 700; }
  .ref-cell.revealed { background: var(--accent-soft); border-color: var(--accent); }
  .ref-cell-kana { font-size: 12px; color: var(--stone); }
  .ref-cell-zh { font-size: 15px; font-weight: 700; color: var(--charcoal); }

  .ref-grid.zh-pinned .ref-cell { cursor: default; }
  .ref-grid.zh-pinned .ref-cell:hover { border-color: var(--line); }

  /* ===== STUDY ===== */
  .study-layout { max-width: 520px; margin: 0 auto; }

  .card-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 52px 40px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s ease;
  }
  .card-panel:hover { border-color: var(--accent); }

  .card-index-tag {
    position: absolute;
    top: 18px; left: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .card-jp {
    font-family: "Noto Serif JP", serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .card-kana { font-size: 14px; color: var(--stone); margin-bottom: 18px; }
  .card-zh {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    min-height: 28px;
  }
  .card-hint { margin-top: 20px; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

  .card-nav-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 16px;
  }
  .nav-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    width: 36px; height: 36px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-counter { font-size: 12px; color: var(--muted); min-width: 52px; text-align: center; }
  .shuffle-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    padding: 0 16px;
    height: 36px;
    border-radius: var(--r-pill);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    letter-spacing: 0.03em;
  }
  .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== QUIZ ===== */
  .quiz-wrap { max-width: 520px; margin: 0 auto; }

  .study-toolbar-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .study-toolbar-row .inner-tabbar { margin-bottom: 0; }

  .direction-toggle-btn {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--accent);
    background: var(--card);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.03em;
  }
  .direction-toggle-btn:hover { background: var(--accent-soft); }

  .quiz-progress { text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.04em; }

  .quiz-panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 38px 30px;
    text-align: center;
    margin-bottom: 18px;
  }
  .quiz-question-label { font-size: 11px; color: var(--muted); margin-bottom: 16px; letter-spacing: 0.06em; }
  .quiz-jp { font-family: "Noto Serif JP", serif; font-size: 26px; font-weight: 700; color: var(--charcoal); margin-bottom: 6px; }
  .quiz-kana { font-size: 13px; color: var(--stone); }

  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .quiz-option {
    padding: 15px 10px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--charcoal);
    font-size: 14px;
    border-radius: var(--r-md);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.1s ease;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--accent); }
  .quiz-option.correct { background: var(--accent2-soft); border-color: var(--accent2); color: var(--accent2); }
  .quiz-option.wrong { background: #F5E0DC; border-color: #A0463A; color: #7A2C26; }
  .quiz-option:disabled { cursor: default; }

  .quiz-feedback { text-align: center; margin-top: 14px; font-size: 12px; color: var(--accent); min-height: 16px; letter-spacing: 0.04em; }

  .quiz-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; }
  .quiz-score { font-size: 12px; color: var(--stone); }
  .quiz-score strong { color: var(--accent); }

  .next-btn {
    padding: 8px 20px;
    border-radius: var(--r-pill);
    background: var(--charcoal);
    color: var(--on-accent);
    border: none;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
  }
  .next-btn:disabled { opacity: 0.3; cursor: default; }

  .quiz-result { text-align: center; padding: 50px 30px; }
  .quiz-result .big-score { font-family: "Cormorant Garamond", serif; font-size: 52px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
  .quiz-result .result-msg { color: var(--stone); font-size: 13px; margin-bottom: 22px; }
  .restart-btn {
    padding: 10px 28px;
    border-radius: var(--r-pill);
    background: var(--charcoal);
    color: var(--on-accent);
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
  }

  /* ===== CONFUSE ===== */
  .confuse-row {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 22px;
    margin-bottom: 10px;
  }
  .confuse-title { font-size: 12px; color: var(--stone); margin-bottom: 10px; letter-spacing: 0.04em; }
  .confuse-items { display: flex; gap: 10px; flex-wrap: wrap; }
  .confuse-pill {
    background: var(--cream-deep);
    border: 1px solid var(--line);
    border-radius: var(--r-pill);
    padding: 9px 16px;
    font-size: 13px;
  }
  .confuse-pill .k { font-weight: 700; color: var(--charcoal); }
  .confuse-pill .z { font-size: 11px; color: var(--muted); margin-left: 6px; }

  /* ===== PHRASE ===== */
  .phrase-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }
  .phrase-toggle-group { display: flex; gap: 8px; flex-shrink: 0; }
  .phrase-toggle-btn {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    letter-spacing: 0.03em;
  }
  .phrase-toggle-btn:hover { border-color: var(--accent); color: var(--charcoal); }
  .phrase-toggle-btn[data-on="true"] {
    background: var(--charcoal);
    border-color: var(--charcoal);
    color: var(--on-accent);
    font-weight: 700;
  }
  /* ref toggle btn reuse */
  #toggleRefZh {
    padding: 7px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    letter-spacing: 0.03em;
  }
  #toggleRefZh:hover { border-color: var(--accent); color: var(--charcoal); }
  #toggleRefZh[data-on="true"] {
    background: var(--charcoal);
    border-color: var(--charcoal);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scene-tabbar {
    display: flex;
    gap: 8px;
    margin: 0 auto 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }
  .scene-tab-item {
    padding: 8px 18px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.03em;
  }
  .scene-tab-item:hover { border-color: var(--accent); color: var(--charcoal); }
  .scene-tab-item.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
    font-weight: 700;
  }

  .scenario-tabbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 0 auto 14px;
    max-width: 680px;
  }
  .scenario-tab-item {
    padding: 9px 12px;
    border-radius: var(--r-md);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }
  .scenario-tab-item:hover { border-color: var(--accent); color: var(--charcoal); }
  .scenario-tab-item.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
    font-weight: 700;
  }

  .playall-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    max-width: 680px;
    margin: 0 auto 16px;
  }
  .playall-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: var(--r-pill);
    border: 1px solid var(--charcoal);
    background: var(--card);
    color: var(--charcoal);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease, color 0.15s ease;
    letter-spacing: 0.04em;
  }
  .playall-btn:hover { background: var(--parchment); }
  .playall-btn.active { background: var(--charcoal); color: var(--on-accent); }
  .playall-btn svg { width: 13px; height: 13px; }

  .phrase-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 680px;
    margin: 0 auto;
  }

  .phrase-row { display: flex; gap: 10px; align-items: flex-start; }
  .phrase-row.staff { justify-content: flex-start; }
  .phrase-row.customer { justify-content: flex-end; }
  .phrase-row.speaking .phrase-bubble {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .speaker-tag {
    flex-shrink: 0;
    width: 48px;
    text-align: center;
    font-size: 10px;
    padding: 4px 0;
    border-radius: var(--r-pill);
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .phrase-row.staff .speaker-tag {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .phrase-row.customer .speaker-tag {
    background: var(--accent2-soft);
    color: var(--accent2);
    order: 2;
  }

  .phrase-bubble {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 12px 16px;
    max-width: 480px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .phrase-row.staff .phrase-bubble { border-top-left-radius: 2px; }
  .phrase-row.customer .phrase-bubble {
    border-top-right-radius: 2px;
    background: var(--cream-deep);
  }

  .phrase-jp-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 4px;
  }

  .phrase-jp {
    font-family: "Noto Serif JP", serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.7;
  }

  .phrase-jp .furi {
    position: relative;
    cursor: help;
    border-bottom: 1px dashed var(--muted);
  }
  .phrase-jp .furi::after {
    content: attr(data-kana);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    margin-bottom: 6px;
    background: var(--charcoal);
    color: var(--on-accent);
    font-size: 10px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: var(--r-sm);
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.15s ease, transform 0.15s ease;
    pointer-events: none;
    z-index: 5;
    font-family: "Noto Sans TC", sans-serif;
  }
  .phrase-jp .furi:hover::after,
  .phrase-jp .furi.show-tooltip::after {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }

  .speak-btn {
    flex-shrink: 0;
    width: 24px; height: 24px;
    border-radius: var(--r-pill);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--stone);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speak-btn.playing { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .speak-btn svg { width: 11px; height: 11px; }

  .phrase-zh { font-size: 12px; color: var(--stone); display: none; font-family: "Noto Sans TC", sans-serif; margin-top: 2px; }
  body.show-zh .phrase-zh { display: block; }

  @media (max-width: 860px) {
    .quiz-options { grid-template-columns: 1fr; }
    .topbar { padding: 0 18px; }
    .main { padding: 20px 14px 80px; }

function buildFuriganaHTML(text) {
  let result = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const [word, kana] of KANJI_READINGS) {
      if (text.startsWith(word, i) && /[\u4E00-\u9FFF]/.test(word)) {
        result += `<span class="furi" data-kana="${kana}">${word}</span>`;
        i += word.length;
        matched = true;
        break;
      }
    }
    if (!matched) { result += text[i]; i++; }
  }
  return result;
}

const CAT_KEYS = Object.keys(VOCAB_DATA);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refreshCatTabbarVisibility() {
  const needsCat = (currentMode === 'ref' && refSubMode === 'lookup') ||
    (currentMode === 'study');
  document.getElementById('catTabbar').style.display = needsCat ? 'flex' : 'none';
}

function refreshDirectionToggleVisibility() {
  document.getElementById('directionToggleBtn').style.display =
    (currentMode === 'study' && studySubMode === 'quiz') ? 'inline-block' : 'none';
}

// Mode tabs
document.querySelectorAll('#modeTabbar .tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    stopPlayAll();
    document.querySelectorAll('#modeTabbar .tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentMode).classList.add('active');
    refreshCatTabbarVisibility();
    refreshDirectionToggleVisibility();
    enterCurrentMode();
  });
});

// Ref inner tabs
document.getElementById('refInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#refInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  refSubMode = item.dataset.submode;
  document.querySelectorAll('#view-ref .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('ref-' + refSubMode).classList.add('active');
  refreshCatTabbarVisibility();
  enterCurrentMode();
});

// Study inner tabs
document.getElementById('studyInnerTabbar').addEventListener('click', (e) => {
  const item = e.target.closest('.inner-tab-item');
  if (!item) return;
  document.querySelectorAll('#studyInnerTabbar .inner-tab-item').forEach(t => t.classList.remove('active'));
  item.classList.add('active');
  studySubMode = item.dataset.submode;
  document.querySelectorAll('#view-study .inner-view').forEach(v => v.classList.remove('active'));
  document.getElementById('study-' + studySubMode).classList.add('active');
  refreshCatTabbarVisibility();
  refreshDirectionToggleVisibility();
  enterCurrentMode();
});

function enterCurrentMode() {
  if (currentMode === 'ref') {
    if (refSubMode === 'lookup') renderRef();
    if (refSubMode === 'confuse') renderConfuse();
  } else if (currentMode === 'study') {
    if (studySubMode === 'memorize') initStudy();
    if (studySubMode === 'quiz') initQuiz();
  } else if (currentMode === 'phrase') {
    renderPhrase();
  }
}

function buildCatTabs() {
  const bar = document.getElementById('catTabbar');
  bar.innerHTML = '';
  CAT_KEYS.forEach(key => {
    const el = document.createElement('div');
    el.className = 'subtab-item' + (key === currentCat ? ' active' : '');
    el.textContent = VOCAB_DATA[key].label;
    el.addEventListener('click', () => {
      currentCat = key;
      buildCatTabs();
      enterCurrentMode();
    });
    bar.appendChild(el);
  });
}

// ===== REF =====
let currentShapeFilter = "all";
let refZhPinned = false;

function renderRef(keepFilter) {
  if (!keepFilter) currentShapeFilter = "all";
  const items = VOCAB_DATA[currentCat].items;
  const grid = document.getElementById('refGrid');
  grid.classList.toggle('zh-pinned', refZhPinned);
  grid.innerHTML = '';
  items.forEach(item => {
    const cell = document.createElement('div');
    cell.className = 'ref-cell';
    if (refZhPinned) {
      cell.classList.add('revealed');
      cell.innerHTML = `<span class="ref-cell-jp">${item.jp}</span><span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`;
    } else {
      cell.innerHTML = `<span class="ref-cell-jp">${item.jp}</span>`;
      cell.addEventListener('click', () => {
        const revealed = cell.classList.toggle('revealed');
        cell.innerHTML = revealed
          ? `<span class="ref-cell-kana">${item.kana}</span><span class="ref-cell-zh">${item.zh}</span>`
          : `<span class="ref-cell-jp">${item.jp}</span>`;
      });
    }
    grid.appendChild(cell);
  });
}

document.getElementById('toggleRefZh').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  refZhPinned = !isOn;

// ===== QUIZ =====
function initQuiz() {
  const cat = VOCAB_DATA[currentCat];
  quizQueue = shuffle(cat.items.map((_, i) => i));
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  document.getElementById('quizContent').style.display = 'block';
  document.getElementById('quizResultView').style.display = 'none';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const cat = VOCAB_DATA[currentCat];
  const itemIdx = quizQueue[quizIndex];
  const item = cat.items[itemIdx];
  quizAnswered = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }

  const label = document.getElementById('quizQuestionLabel');
  const kanaEl = document.getElementById('quizKana');

  if (quizDirection === 'jp2zh') {
    label.textContent = '這個單字的中文意思是？';
    document.getElementById('quizJp').textContent = item.jp;
    kanaEl.textContent = item.kana;
    kanaEl.style.display = '';
  } else {
    label.textContent = '這個中文對應的日文是？';
    document.getElementById('quizJp').textContent = item.zh;
    kanaEl.textContent = '';
    kanaEl.style.display = 'none';
  }

  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('nextQuestionBtn').disabled = true;
  document.getElementById('quizProgress').textContent = `第 ${quizIndex + 1} 題 / 共 ${quizQueue.length} 題`;

  const correctAnswer = quizDirection === 'jp2zh' ? item.zh : item.jp;
  const pool = cat.items.filter((_, i) => i !== itemIdx).map(x => quizDirection === 'jp2zh' ? x.zh : x.jp);
  const options = shuffle([correctAnswer, ...shuffle(pool).slice(0, 3)]);

  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => handleAnswer(btn, opt, correctAnswer));
    optWrap.appendChild(btn);
  });

  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex}`;
}

function handleAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
    document.getElementById('quizFeedback').textContent = '答對了';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizFeedback').textContent = `正確答案：${correct}`;
  }
  document.getElementById('scoreText').textContent = `${quizScore} / ${quizIndex + 1}`;
  document.getElementById('nextQuestionBtn').disabled = false;
  if (chosen === correct) {
    autoAdvanceTimer = setTimeout(() => { autoAdvanceTimer = null; goToNextQuestion(); }, 600);
  }
}

function goToNextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) showQuizResult();
  else renderQuizQuestion();
}

document.getElementById('nextQuestionBtn').addEventListener('click', () => {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  goToNextQuestion();
});

document.getElementById('directionToggleBtn').addEventListener('click', (e) => {
  quizDirection = quizDirection === 'jp2zh' ? 'zh2jp' : 'jp2zh';
  e.target.textContent = quizDirection === 'jp2zh' ? '切換為「中→日」' : '切換為「日→中」';
  initQuiz();
});

function showQuizResult() {
  document.getElementById('quizContent').style.display = 'none';
  document.getElementById('quizResultView').style.display = 'block';
  const total = quizQueue.length;
  document.getElementById('finalScore').textContent = `${quizScore} / ${total}`;
  const ratio = quizScore / total;
  let msg = '繼續加油，多複習幾次吧';
  if (ratio === 1) msg = '完美，這個分類已經記熟了';
  else if (ratio >= 0.8) msg = '很不錯，幾乎全對';
  else if (ratio >= 0.5) msg = '還可以，再複習一輪會更熟練';
  document.getElementById('resultMsg').textContent = msg;
}

    speakBtn.addEventListener('click', () => {
      stopPlayAll();
      speakJapanese(item.jp, item.speaker, speakBtn, row);
    });
    list.appendChild(row);
  });
}

// Speech
let cachedJaVoices = null;
function getJaVoices() {
  if (cachedJaVoices && cachedJaVoices.length) return cachedJaVoices;
  if (!('speechSynthesis' in window)) return [];
  cachedJaVoices = window.speechSynthesis.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith('ja'));
  return cachedJaVoices;
}
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => { cachedJaVoices = null; };
}

function configureUtteranceForSpeaker(utter, speaker) {
  const voices = getJaVoices();
  if (voices.length >= 2) {
    const femaleHint = voices.find(v => /female|女|f\b/i.test(v.name));
    const maleHint = voices.find(v => /male|男|m\b/i.test(v.name) && v !== femaleHint);
    utter.voice = speaker === 'staff' ? (femaleHint || voices[0]) : (maleHint || voices[1] || voices[0]);
  } else if (voices.length === 1) {
    utter.voice = voices[0];
  }
  utter.pitch = speaker === 'staff' ? 1.1 : 0.9;
  utter.rate = speaker === 'staff' ? 0.92 : 0.95;
}

function speakJapanese(text, speaker, btn, row) {
  if (!('speechSynthesis' in window)) { alert('您的瀏覽器不支援語音播放功能'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  configureUtteranceForSpeaker(utter, speaker);
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  if (row) row.classList.add('speaking');
  utter.onend = () => { if (btn) btn.classList.remove('playing'); if (row) row.classList.remove('speaking'); };
  utter.onerror = () => { if (btn) btn.classList.remove('playing'); if (row) row.classList.remove('speaking'); };
  window.speechSynthesis.speak(utter);
}

// Play all
let playAllActive = false;
let playAllQueueIndex = 0;
let playAllAbort = false;

function setPlayAllButtonState(isPlaying) {
  const btn = document.getElementById('playAllBtn');
  const icon = document.getElementById('playAllIcon');
  btn.classList.toggle('active', isPlaying);
  document.getElementById('playAllLabel').textContent = isPlaying ? '停止播放' : '全部播放本情境';
  icon.innerHTML = isPlaying
    ? '<rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect>'
    : '<polygon points="6 4 20 12 6 20 6 4"></polygon>';
}

function stopPlayAll() {
  if (!playAllActive) return;
  playAllAbort = true; playAllActive = false;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
  document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
  setPlayAllButtonState(false);
}

function playAllScenario() {
  const items = PHRASE_DATA[currentPhraseScene].scenarios[currentScenarioIndex].items;
  const rows = Array.from(document.querySelectorAll('#phraseList .phrase-row'));
  playAllActive = true; playAllAbort = false; playAllQueueIndex = 0;
  setPlayAllButtonState(true);

  function playNext() {
    if (playAllAbort) return;
    if (playAllQueueIndex >= items.length) { playAllActive = false; setPlayAllButtonState(false); return; }
    const item = items[playAllQueueIndex];
    const row = rows[playAllQueueIndex];
    const speakBtn = row ? row.querySelector('.speak-btn') : null;
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (!('speechSynthesis' in window)) { alert('您的瀏覽器不支援語音播放功能'); stopPlayAll(); return; }
    const utter = new SpeechSynthesisUtterance(item.jp);
    utter.lang = 'ja-JP';
    configureUtteranceForSpeaker(utter, item.speaker);
    document.querySelectorAll('.speak-btn.playing').forEach(b => b.classList.remove('playing'));
    document.querySelectorAll('.phrase-row.speaking').forEach(r => r.classList.remove('speaking'));
    if (speakBtn) speakBtn.classList.add('playing');
    if (row) row.classList.add('speaking');
    utter.onend = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) setTimeout(playNext, 350);
    };
    utter.onerror = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      if (row) row.classList.remove('speaking');
      playAllQueueIndex++;
      if (!playAllAbort) setTimeout(playNext, 350);
    };
    window.speechSynthesis.speak(utter);
  }
  playNext();
}

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (playAllActive) stopPlayAll(); else playAllScenario();
});

function renderPhrase() {
  buildSceneTabs();
  buildScenarioTabs();
  renderPhraseList();
}

document.getElementById('toggleZh').addEventListener('click', (e) => {
  const isOn = e.target.dataset.on === 'true';
  e.target.dataset.on = String(!isOn);
  document.body.classList.toggle('show-zh', !isOn);
});

const MOON_PATH = `<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"></path>`;
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').innerHTML = theme === 'dark' ? MOON_PATH : SUN_PATH;
}
applyTheme((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

buildCatTabs();
renderRef();
refreshDirectionToggleVisibility();
